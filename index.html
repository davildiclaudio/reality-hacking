<!-- google fonts removed for offline/sandbox portability; using system fallbacks -->
<style>
  :root {
    --bg-0: #0b0a0c;
    --bg-1: #141217;
    --bg-2: #1c1920;
    --bg-3: #27232c;
    --ink: #ece6dd;
    --ink-dim: #a69e93;
    --ink-mute: #6c6459;
    --crimson: #a9243a;
    --crimson-bright: #d63a52;
    --gold: #c9a96a;
    --gold-dim: #8c7848;
    --line: #2a2530;
  }
  html, body { background: var(--bg-0); color: var(--ink); }
  body {
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    font-feature-settings: "ss01","cv11";
  }
  h1, h2, h3, .serif { font-family: 'Cormorant Garamond', Georgia, serif; letter-spacing: 0.005em; }
  code, .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .ru { font-family: 'Cormorant Garamond', 'Times New Roman', serif; font-style: italic; color: var(--gold); }
  .scrollbar::-webkit-scrollbar { width: 8px; height: 8px; }
  .scrollbar::-webkit-scrollbar-track { background: var(--bg-1); }
  .scrollbar::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
  .scrollbar::-webkit-scrollbar-thumb:hover { background: var(--crimson); }
  .divider { height: 1px; background: linear-gradient(90deg, transparent, var(--line), transparent); }
  .vline { width: 1px; background: var(--line); }
  .noise {
    background-image:
      radial-gradient(ellipse at 20% 10%, rgba(169,36,58,0.12), transparent 55%),
      radial-gradient(ellipse at 85% 85%, rgba(201,169,106,0.07), transparent 55%);
  }
  .card {
    background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
    border: 1px solid var(--line);
  }
  .card-hover:hover {
    border-color: rgba(169,36,58,0.55);
    transform: translateY(-1px);
    transition: all 180ms ease;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 2px 10px; border-radius: 2px;
    background: var(--bg-3); border: 1px solid var(--line);
    font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
    color: var(--ink-dim);
  }
  .chip.gold { color: var(--gold); border-color: rgba(201,169,106,0.25); }
  .chip.crimson { color: var(--crimson-bright); border-color: rgba(169,36,58,0.4); }
  .btn {
    padding: 10px 18px; border-radius: 2px;
    border: 1px solid var(--line); background: var(--bg-2);
    color: var(--ink); font-size: 13px; letter-spacing: 0.04em;
    transition: all 150ms ease; cursor: pointer;
  }
  .btn:hover { border-color: var(--crimson); background: var(--bg-3); }
  .btn.primary {
    background: linear-gradient(180deg, #8a1d2f, #6f1524);
    border-color: #a9243a;
  }
  .btn.primary:hover { background: linear-gradient(180deg, #a9243a, #8a1d2f); }
  .btn.ghost { background: transparent; }
  .link-crimson { color: var(--crimson-bright); border-bottom: 1px dotted var(--crimson); }
  .link-crimson:hover { color: #ee6278; border-bottom-color: #ee6278; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; border-left: 2px solid transparent;
    color: var(--ink-dim); font-size: 13px; letter-spacing: 0.03em;
    cursor: pointer; transition: all 120ms;
  }
  .nav-item:hover { color: var(--ink); background: rgba(255,255,255,0.02); }
  .nav-item.active {
    color: var(--ink); border-left-color: var(--crimson);
    background: linear-gradient(90deg, rgba(169,36,58,0.1), transparent);
  }
  .nav-num { color: var(--ink-mute); font-family: 'JetBrains Mono', monospace; font-size: 10px; width: 20px; }
  .section-title { display: flex; align-items: baseline; gap: 16px; }
  .section-num {
    color: var(--gold-dim); font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.1em;
  }
  .section-rule { flex: 1; height: 1px; background: var(--line); margin-left: 12px; }
  .tag {
    display: inline-block; padding: 1px 8px; border-radius: 2px;
    font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
  }
  .tag.base { background: rgba(201,169,106,0.08); color: var(--gold); border: 1px solid rgba(201,169,106,0.2); }
  .tag.tech { background: rgba(169,36,58,0.1); color: var(--crimson-bright); border: 1px solid rgba(169,36,58,0.3); }
  .tag.adv  { background: rgba(120,80,170,0.1); color: #b291d9; border: 1px solid rgba(120,80,170,0.3); }
  .tag.tafti { background: #1a0005; color: #ee6278; border: 1px solid rgba(169,36,58,0.5); }
  .timeline-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--crimson); box-shadow: 0 0 0 4px rgba(169,36,58,0.15);
  }
  .timeline-dot.tafti { background: var(--gold); box-shadow: 0 0 0 4px rgba(201,169,106,0.18); }
  .glow-border { box-shadow: inset 0 0 0 1px rgba(169,36,58,0.25), 0 0 40px rgba(169,36,58,0.06); }
  .week-cell {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: var(--bg-2); border: 1px solid var(--line);
    color: var(--ink-dim); cursor: pointer; transition: all 120ms;
  }
  .week-cell:hover { border-color: var(--crimson); color: var(--ink); }
  .week-cell.done { background: rgba(169,36,58,0.18); color: #ee6278; border-color: var(--crimson); }
  .week-cell.current { border-color: var(--gold); color: var(--gold); }
  details > summary { list-style: none; cursor: pointer; }
  details > summary::-webkit-details-marker { display: none; }
  details[open] > summary .chevron { transform: rotate(90deg); }
  .chevron { transition: transform 150ms; display: inline-block; }
  textarea, input, select {
    background: var(--bg-1); border: 1px solid var(--line); color: var(--ink);
    padding: 10px 12px; border-radius: 2px; font-family: inherit; font-size: 14px;
    width: 100%;
  }
  textarea:focus, input:focus, select:focus { outline: none; border-color: var(--crimson); }
  .kbd {
    display: inline-block; padding: 1px 6px; border-radius: 2px;
    background: var(--bg-3); border: 1px solid var(--line);
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-dim);
  }
  .quote-mark {
    font-family: 'Cormorant Garamond', serif; font-size: 80px;
    line-height: 0.5; color: var(--crimson); opacity: 0.4;
  }
  .fade-in { animation: fadeIn 280ms ease; }
  @keyframes fadeIn { from {opacity:0; transform: translateY(6px);} to {opacity:1; transform: translateY(0);} }

  /* ====== Animations & decor ====== */
  @keyframes floatY { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
  @keyframes floatYslow { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  @keyframes rotateSlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes rotateBack { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  @keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(169,36,58,0.0), 0 0 24px 0 rgba(201,169,106,0.04); }
    50%      { box-shadow: 0 0 0 4px rgba(169,36,58,0.10), 0 0 48px 8px rgba(201,169,106,0.10); }
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; transform: scale(1); }
    50%      { opacity: 0.75; transform: scale(1.35); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-14px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes breatheBg {
    0%, 100% { filter: brightness(1) saturate(1); }
    50%      { filter: brightness(1.08) saturate(1.1); }
  }

  .anim-float     { animation: floatY 4.2s ease-in-out infinite; display: inline-block; }
  .anim-float-slow{ animation: floatYslow 7s ease-in-out infinite; display: inline-block; }
  .anim-rotate    { animation: rotateSlow 60s linear infinite; transform-origin: center; }
  .anim-rotate-back { animation: rotateBack 80s linear infinite; transform-origin: center; }
  .anim-pulse     { animation: pulseGlow 4.8s ease-in-out infinite; }
  .anim-slide-left{ animation: slideInLeft 420ms ease; }
  .anim-slide-up  { animation: slideInUp 520ms ease both; }
  .anim-breathe   { animation: breatheBg 6.5s ease-in-out infinite; }
  .anim-twinkle   { animation: twinkle 3.5s ease-in-out infinite; }

  .shimmer-text {
    background: linear-gradient(90deg, var(--gold-dim) 0%, var(--gold) 20%, #fff2c9 40%, var(--gold) 60%, var(--gold-dim) 100%);
    background-size: 200% 100%;
    background-clip: text;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
    animation: shimmer 6s linear infinite;
  }

  /* Staggered card entrance */
  .stagger > * { opacity: 0; animation: slideInUp 520ms ease forwards; }
  .stagger > *:nth-child(1){ animation-delay: 60ms; }
  .stagger > *:nth-child(2){ animation-delay: 120ms; }
  .stagger > *:nth-child(3){ animation-delay: 180ms; }
  .stagger > *:nth-child(4){ animation-delay: 240ms; }
  .stagger > *:nth-child(5){ animation-delay: 300ms; }
  .stagger > *:nth-child(6){ animation-delay: 360ms; }

  .glow-border {
    box-shadow: 0 0 0 1px rgba(201,169,106,0.18), 0 20px 60px -20px rgba(169,36,58,0.35);
  }

  /* Hero decor container */
  .hero-wrap { position: relative; overflow: hidden; }
  .hero-mandala {
    position: absolute;
    top: -40px; right: -60px;
    width: 380px; height: 380px;
    opacity: 0.18; pointer-events: none;
    mix-blend-mode: screen;
  }
  .hero-constellation {
    position: absolute;
    bottom: -20px; left: -20px;
    width: 280px; height: 200px;
    opacity: 0.5; pointer-events: none;
  }
  .hero-wave {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 80px;
    opacity: 0.35;
    pointer-events: none;
  }

  /* Section divider with ornament */
  .ornament {
    display: flex; align-items: center; gap: 14px;
    margin: 32px 0;
    color: var(--gold-dim);
  }
  .ornament::before, .ornament::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }

  /* Emoji icon chip */
  .emoji-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 40px; height: 40px;
    border-radius: 999px;
    background: radial-gradient(circle at 30% 30%, rgba(201,169,106,0.18), rgba(169,36,58,0.10) 60%, transparent 80%);
    border: 1px solid var(--line);
    font-size: 20px;
    line-height: 1;
  }
  .emoji-chip.large { width: 56px; height: 56px; font-size: 28px; }

  .hover-lift { transition: transform 220ms ease, box-shadow 220ms ease; }
  .hover-lift:hover { transform: translateY(-3px); box-shadow: 0 16px 36px -12px rgba(169,36,58,0.35); }

  /* Body background — very subtle moving gradient */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 15% 8%, rgba(169,36,58,0.07), transparent 55%),
      radial-gradient(ellipse at 85% 90%, rgba(201,169,106,0.05), transparent 55%);
    pointer-events: none;
    z-index: 0;
    animation: breatheBg 9s ease-in-out infinite;
  }

  /* Respect users who prefer less motion */
  @media (prefers-reduced-motion: reduce) {
    .anim-float, .anim-float-slow, .anim-rotate, .anim-rotate-back,
    .anim-pulse, .anim-breathe, .anim-twinkle, .shimmer-text,
    .stagger > * { animation: none !important; opacity: 1 !important; }
    body::before { animation: none !important; }
  }

  /* ============================================================ */
  /* MOBILE RESPONSIVE                                              */
  /* ============================================================ */
  .mobile-menu-btn {
    display: none;
    position: fixed;
    top: 14px;
    left: 14px;
    z-index: 90;
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    color: var(--ink);
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  .mobile-menu-btn svg { width: 22px; height: 22px; }
  .mobile-nav-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 80;
  }

  @media (max-width: 768px) {
    .mobile-menu-btn { display: flex; }

  q: "Dove si trova esattamente la Treccia dell'intenzione?",
  a: "La Treccia (косица / плейт) si trova dietro le scapole, ma la posizione esatta è soggettiva. Zeland è esplicito: «Non cercate un punto anatomico preciso. Il punto è dove lo sentite voi, ed è reale nel momento in cui vi portate l'attenzione lì.» Può essere al centro della schiena alta, leggermente sopra le scapole, o un palmo dietro di voi. L'importante è la direzione (posteriore) e la qualità (impostare, non chiedere).",
  fonti: ["Cosa non ha detto Tafti, cap. «Treccia 1-3»", "Tafti la Sacerdotessa, cap. «La Metaforza»"],
  tags: ["treccia", "metaforza", "posizione", "косица"]
}, {
  q: "Qual è la differenza tra intenzione interna ed esterna?",
  a: "L'intenzione interna è lo sforzo di agire direttamente sul mondo per ottenere (fare, spingere, persuadere). Funziona per i gesti quotidiani. L'intenzione esterna è la determinazione di lasciare che il mondo compia secondo il tuo stato interno: non è «volere di più», è sapere senza sforzo. Nell'era Tafti, l'intenzione esterna si concretizza come Metaforza attivata dalla Treccia.",
  fonti: ["Transurfing I", "Tafti la Sacerdotessa"],
  tags: ["intenzione", "metaforza", "esterna", "interna"]
}, {
  q: "Come faccio a capire se una situazione è un pendolo?",
  a: "Tre segnali. Primo: senti un'emozione carica (rabbia, entusiasmo collettivo, indignazione, paura irrazionale) sproporzionata al fatto. Secondo: la tua attenzione è risucchiata — pensi alla cosa anche quando non vorresti. Terzo: c'è una struttura collettiva che «cresce» dal tuo coinvolgimento (un partito, un gruppo, un drama ricorrente, un social media, un'ideologia). Se i tre segnali coincidono, sei dentro un pendolo.",
  fonti: ["Transurfing I", "Transurfing III"],
  tags: ["pendoli", "identificazione", "маятник"]
}, {
  q: "Lo slide non funziona, cosa sbaglio?",
  a: "Tre errori tipici. 1) Guardi la scena invece di starci dentro: devi sentire, toccare, respirare dentro l'immagine, non osservarla da fuori come un film. 2) Troppa carica emotiva: se lo slide ti fa ansia, stai emettendo «voglio» ad alta potenza e le forze di equilibrio intervengono. Riduci prima l'importanza. 3) Stai visualizzando la Porta invece dell'Obiettivo: se visualizzi la strada (es. «entrerò in quella azienda») invece della cima (es. «vivo una vita creativa, libera, ben retribuita»), limiti il corridoio.",
  fonti: ["Transurfing I", "Transurfing V"],
  tags: ["slide", "errori", "importanza", "obiettivo"]
}, {
  q: "Cosa sono gli «Schermi» di Tafti?",
  a: "Due schermi. Lo schermo ESTERNO è ciò che vedi in questo momento: la stanza, le persone, la strada. Lo schermo INTERNO è ciò che immagini, ricordi, temi, progetti. La maggior parte delle persone vive sullo schermo interno credendo di vivere sull'esterno — reagiscono a proiezioni, non a fatti. La pratica Tafti base è distinguerli consapevolmente: 30 secondi davvero sullo schermo esterno, 30 secondi sullo schermo interno. Ripetere.",
  fonti: ["Cosa non ha detto Tafti, cap. «Gli Schermi»"],
  tags: ["schermi", "attenzione", "экраны", "presenza"]
}, {
  q: "Cosa significa «cadere dal pendolo»?",
  a: "Проваливание маятника. Non è combattere il pendolo (questo lo nutre): è diventare invisibile al suo meccanismo. Ritiri l'attenzione, non partecipi al dramma, non difendi le tue ragioni dove non sono strettamente necessarie, non ti indigni, non esulti insieme agli altri. Il pendolo non trova aggancio emotivo e la sua influenza su di te si dissipa. Non è fuga passiva — è non-partecipazione consapevole.",
  fonti: ["Transurfing I", "Transurfing III"],
  tags: ["pendoli", "caduta", "проваливание"]

  q: "Che differenza c'è tra Obiettivo e Porta?",

TECNICHE PRATICHE (come istruirle):
1. Ridurre l'importanza: notare quando un oggetto/persona/evento ha "troppo peso"; ammorbidire l'aggrappo, restituire la misura reale. L'eccesso di peso attiva l'equilibrio che costruisce l'ostacolo.

8. Intenzione esterna (cuore del sistema): non "lo farò succedere" ma "sto lasciando che succeda". Richiede fiducia e aver smesso di aver bisogno del risultato.
9. Fasci di attenzione (Tafti, 2018): dividere l'attenzione in due fasci simultanei — uno che guarda la scena, uno che guarda chi sta guardando. Chi mantiene entrambi accesi esce dall'automatismo.

11. Protocollo d'ingresso alla giornata: al mattino accendere i fasci di attenzione, fissare diapositiva/lastra, decidere il tono interno, ringraziare. 2 minuti.
12. Le 8 Regole della Metaforza (Tafti 2, 2024) — codice operativo interiore: non spiegarsi, non giustificarsi, non chiedere permesso a chi non può darlo, agire con dolcezza senza esitazione, scegliere la versione che si vuole essere, non quella che ci si aspetta, ecc.

14. Verità leggera (Trasferirsi): dire e pensare la verità senza farne arma o ideologia.
15. Coerenza intenzione-attenzione-sensazione: il gesto ha forza quando le tre convergono. Intenzione senza attenzione è fantasticheria; attenzione senza sensazione è freddezza; sensazione senza intenzione è reazione.
